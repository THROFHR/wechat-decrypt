name: Build Windows EXE

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run focused tests
        run: python -m unittest tests.test_exe_launcher

      - name: Build Windows executable
        shell: cmd
        run: build.bat --ci

      - name: Smoke test executable help output
        run: .\dist\WeChatDecrypt.exe --help

      - name: Assemble release zip
        shell: pwsh
        run: |
          $pkg = "release-package"
          $zip = "WeChatDecrypt-windows.zip"
          if (Test-Path $pkg) { Remove-Item $pkg -Recurse -Force }
          if (Test-Path $zip) { Remove-Item $zip -Force }

          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item "dist/WeChatDecrypt.exe" -Destination $pkg -Force
          Copy-Item "EXE_USAGE.md" -Destination $pkg -Force

          if (Test-Path "webUI") {
            Get-ChildItem -Path "webUI" -Force | Copy-Item -Destination $pkg -Recurse -Force
          }

          Compress-Archive -Path "$pkg/*" -DestinationPath $zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WeChatDecrypt-windows
          path: WeChatDecrypt-windows.zip
          if-no-files-found: error
